services:
  - type: web
    name: market-pulse-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: MONGODB_CONNECTION_STRING
        sync: false
      - key: MONGODB_DATABASE_NAME
        value: marketpulse
      - key: FIREBASE_PROJECT_ID
        sync: false
